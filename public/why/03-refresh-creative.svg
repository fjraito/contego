<svg viewBox="0 0 800 420" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="Inter, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="r-bg" x1="0" y1="0" x2="800" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0b0d0c"/>
      <stop offset="1" stop-color="#0f1211"/>
    </linearGradient>
    <radialGradient id="r-glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(560 150) scale(380 300)">
      <stop offset="0" stop-color="#5AE48E" stop-opacity="0.13"/>
      <stop offset="1" stop-color="#5AE48E" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="r-ray" x1="120" y1="0" x2="300" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8befb0" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#8befb0" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="r-new" x1="420" y1="0" x2="740" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#43c07d"/>
      <stop offset="1" stop-color="#8befb0"/>
    </linearGradient>
    <linearGradient id="r-newfill" x1="0" y1="120" x2="0" y2="340" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#43c07d" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#43c07d" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="r-tile" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5AE48E" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#5AE48E" stop-opacity="0.02"/>
    </linearGradient>
    <filter id="r-soft" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
    <filter id="r-soft-sm" x="-120%" y="-120%" width="340%" height="340%">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
  </defs>

  <rect width="800" height="420" fill="url(#r-bg)"/>
  <polygon points="120,0 260,0 420,420 280,420" fill="url(#r-ray)"/>
  <rect width="800" height="420" fill="url(#r-glow)"/>

  <!-- fine grid -->
  <g stroke="#5AE48E" stroke-opacity="0.05">
    <path d="M0 105H800M0 210H800M0 315H800"/>
    <path d="M160 0V420M320 0V420M480 0V420M640 0V420"/>
  </g>

  <!-- ambient particles -->
  <g fill="#7EEBA8">
    <circle cx="140" cy="76" r="2.5" opacity="0.6"/>
    <circle cx="140" cy="76" r="7" opacity="0.15" filter="url(#r-soft-sm)"/>
    <circle cx="690" cy="68" r="3" opacity="0.75"/>
    <circle cx="690" cy="68" r="8" opacity="0.18" filter="url(#r-soft-sm)"/>
    <circle cx="86" cy="330" r="2" opacity="0.4"/>
  </g>

  <!-- baseline -->
  <path d="M70 336 H 740" stroke="#5AE48E" stroke-opacity="0.18"/>

  <!-- OLD creative: rises then fatigues (dim) -->
  <path d="M70 300 C 140 220 190 180 250 180 C 310 180 350 230 408 292"
        stroke="#5AE48E" stroke-opacity="0.30" stroke-width="2" stroke-dasharray="1 7" stroke-linecap="round"/>
  <circle cx="408" cy="292" r="4" fill="#5AE48E" opacity="0.4"/>
  <text x="238" y="152" text-anchor="middle" font-size="9" letter-spacing="2.5" fill="#96cbaa" opacity="0.5">CREATIVE FATIGUE</text>
  <path d="M238 160 V 174" stroke="#5AE48E" stroke-opacity="0.25"/>

  <!-- refresh point marker -->
  <g>
    <path d="M430 96 V 336" stroke="#7EEBA8" stroke-opacity="0.25" stroke-dasharray="3 6"/>
    <circle cx="430" cy="216" r="34" fill="#0e1a13" stroke="#7EEBA8" stroke-opacity="0.9"/>
    <circle cx="430" cy="216" r="34" fill="#7EEBA8" opacity="0.20" filter="url(#r-soft)"/>
    <!-- refresh arrows glyph -->
    <g stroke="#7EEBA8" stroke-width="2.4" fill="none" stroke-linecap="round">
      <path d="M444 208 A 15.5 15.5 0 1 0 445.5 219"/>
      <path d="M446 199 L 445 209 L 435 207" stroke-linejoin="round"/>
    </g>
  </g>
  <text x="430" y="372" text-anchor="middle" font-size="9" letter-spacing="3" fill="#96cbaa" opacity="0.6">NEW VARIATION LIVE</text>

  <!-- NEW creative: bright rising curve -->
  <path d="M452 296 C 520 288 560 240 620 196 C 668 162 700 148 738 140 L 738 336 L 452 336 Z" fill="url(#r-newfill)"/>
  <path d="M452 296 C 520 288 560 240 620 196 C 668 162 700 148 738 140"
        stroke="url(#r-new)" stroke-width="3" stroke-linecap="round"/>
  <path d="M452 296 C 520 288 560 240 620 196 C 668 162 700 148 738 140"
        stroke="#7EEBA8" stroke-width="3" opacity="0.35" filter="url(#r-soft-sm)"/>

  <!-- data points on new curve -->
  <g>
    <circle cx="560" cy="242" r="4.5" fill="#0e1a13" stroke="#7EEBA8" stroke-width="1.6"/>
    <circle cx="672" cy="160" r="5.5" fill="#7EEBA8"/>
    <circle cx="672" cy="160" r="12" fill="#7EEBA8" opacity="0.25" filter="url(#r-soft-sm)"/>
  </g>

  <!-- performance chip on the new curve -->
  <g>
    <rect x="606" y="96" width="134" height="30" rx="15" fill="#0e1a13" stroke="#7EEBA8" stroke-opacity="0.9"/>
    <path d="M622 114 L 628 107 L 633 111 L 640 103" stroke="#7EEBA8" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M640 103 H 634 M640 103 V 109" stroke="#7EEBA8" stroke-width="1.8" stroke-linecap="round"/>
    <text x="692" y="115" text-anchor="middle" font-size="10" letter-spacing="1.2" fill="#7EEBA8">CTR BACK UP</text>
    <path d="M672 126 V 152" stroke="#7EEBA8" stroke-opacity="0.35"/>
  </g>

  <!-- small stacked variant cards feeding the refresh point -->
  <g>
    <rect x="330" y="118" width="54" height="70" rx="12" fill="url(#r-tile)" stroke="#5AE48E" stroke-opacity="0.25" transform="rotate(-8 357 153)"/>
    <rect x="352" y="108" width="54" height="70" rx="12" fill="url(#r-tile)" stroke="#5AE48E" stroke-opacity="0.40"/>
    <path d="M373 130 L 388 139 L 373 148 Z" fill="#7EEBA8" opacity="0.8"/>
  </g>
</svg>
