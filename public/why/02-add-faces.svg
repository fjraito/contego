<svg viewBox="0 0 800 420" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="Inter, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="f-bg" x1="0" y1="0" x2="800" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0b0d0c"/>
      <stop offset="1" stop-color="#0f1211"/>
    </linearGradient>
    <radialGradient id="f-glow-c" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(400 210) scale(430 320)">
      <stop offset="0" stop-color="#5AE48E" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#5AE48E" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="f-ray" x1="560" y1="0" x2="420" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8befb0" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#8befb0" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="f-tile" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5AE48E" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#5AE48E" stop-opacity="0.02"/>
    </linearGradient>
    <linearGradient id="f-tile-hot" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#43c07d" stop-opacity="0.26"/>
      <stop offset="1" stop-color="#43c07d" stop-opacity="0.05"/>
    </linearGradient>
    <filter id="f-soft" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
    <filter id="f-soft-sm" x="-120%" y="-120%" width="340%" height="340%">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
  </defs>

  <rect width="800" height="420" fill="url(#f-bg)"/>
  <polygon points="520,0 660,0 480,420 340,420" fill="url(#f-ray)"/>
  <rect width="800" height="420" fill="url(#f-glow-c)"/>

  <!-- fine grid -->
  <g stroke="#5AE48E" stroke-opacity="0.05">
    <path d="M0 105H800M0 210H800M0 315H800"/>
    <path d="M160 0V420M320 0V420M480 0V420M640 0V420"/>
  </g>

  <!-- ambient particles -->
  <g fill="#7EEBA8">
    <circle cx="96" cy="80" r="2.5" opacity="0.6"/>
    <circle cx="96" cy="80" r="7" opacity="0.15" filter="url(#f-soft-sm)"/>
    <circle cx="716" cy="72" r="3" opacity="0.7"/>
    <circle cx="716" cy="72" r="8" opacity="0.16" filter="url(#f-soft-sm)"/>
    <circle cx="700" cy="356" r="2" opacity="0.45"/>
    <circle cx="120" cy="352" r="2" opacity="0.4"/>
  </g>

  <!-- glow behind center tile -->
  <ellipse cx="400" cy="212" rx="120" ry="140" fill="#43c07d" opacity="0.18" filter="url(#f-soft)"/>

  <!-- side creator tiles (dim, receding) -->
  <!-- far left -->
  <g opacity="0.45">
    <rect x="118" y="140" width="104" height="150" rx="20" fill="url(#f-tile)" stroke="#5AE48E" stroke-opacity="0.25"/>
    <circle cx="170" cy="192" r="22" fill="#5AE48E" opacity="0.20"/>
    <path d="M134 268 C 134 240 152 228 170 228 C 188 228 206 240 206 268" fill="#5AE48E" opacity="0.16"/>
  </g>
  <!-- left -->
  <g opacity="0.75">
    <rect x="248" y="126" width="116" height="172" rx="22" fill="url(#f-tile)" stroke="#5AE48E" stroke-opacity="0.30"/>
    <circle cx="306" cy="186" r="25" fill="#5AE48E" opacity="0.26"/>
    <path d="M266 282 C 266 250 286 236 306 236 C 326 236 346 250 346 282" fill="#5AE48E" opacity="0.20"/>
  </g>
  <!-- right -->
  <g opacity="0.75">
    <rect x="436" y="126" width="116" height="172" rx="22" fill="url(#f-tile)" stroke="#5AE48E" stroke-opacity="0.30"/>
    <circle cx="494" cy="186" r="25" fill="#5AE48E" opacity="0.26"/>
    <path d="M454 282 C 454 250 474 236 494 236 C 514 236 534 250 534 282" fill="#5AE48E" opacity="0.20"/>
  </g>
  <!-- far right: add-new tile, dashed -->
  <g opacity="0.8">
    <rect x="578" y="140" width="104" height="150" rx="20" stroke="#5AE48E" stroke-opacity="0.45" stroke-dasharray="6 6" fill="#5AE48E" fill-opacity="0.03"/>
    <path d="M630 196 V 234 M611 215 H 649" stroke="#7EEBA8" stroke-width="2.5" stroke-linecap="round" opacity="0.85"/>
    <text x="630" y="262" text-anchor="middle" font-size="9" letter-spacing="2" fill="#96cbaa" opacity="0.6">NEW FACE</text>
  </g>

  <!-- CENTER: selected creator tile -->
  <g>
    <rect x="336" y="106" width="128" height="196" rx="24" fill="url(#f-tile-hot)" stroke="#7EEBA8" stroke-opacity="0.9" stroke-width="1.5"/>
    <rect x="344" y="114" width="112" height="180" rx="18" stroke="#7EEBA8" stroke-opacity="0.12"/>
    <!-- avatar -->
    <circle cx="400" cy="178" r="29" fill="#7EEBA8" opacity="0.9"/>
    <circle cx="400" cy="178" r="29" fill="#7EEBA8" opacity="0.30" filter="url(#f-soft-sm)"/>
    <path d="M354 288 C 354 248 378 234 400 234 C 422 234 446 248 446 288" fill="#7EEBA8" opacity="0.55"/>
    <!-- mask edge to keep shoulders inside tile -->
    <rect x="336" y="106" width="128" height="196" rx="24" stroke="#7EEBA8" stroke-opacity="0.9" stroke-width="1.5" fill="none"/>
    <!-- play chip -->
    <circle cx="400" cy="178" r="13" fill="#0e1a13"/>
    <path d="M396 171.5 L 407 178 L 396 184.5 Z" fill="#7EEBA8"/>
  </g>

  <!-- badge: no reshoot -->
  <g>
    <rect x="452" y="96" width="118" height="26" rx="13" fill="#0e1a13" stroke="#7EEBA8" stroke-opacity="0.9"/>
    <!-- camera-off glyph -->
    <g stroke="#7EEBA8" stroke-width="1.6" stroke-linecap="round">
      <rect x="464" y="104" width="13" height="10" rx="2.5" fill="none"/>
      <path d="M477 107 L 483 104 V 114 L 477 111"/>
      <path d="M462 116 L 486 102"/>
    </g>
    <text x="527" y="113" text-anchor="middle" font-size="10" letter-spacing="1.2" fill="#7EEBA8">NO RESHOOT</text>
  </g>

  <!-- swap arrows under lineup -->
  <g stroke="#5AE48E" stroke-opacity="0.5" fill="none" stroke-linecap="round">
    <path d="M320 336 H 480" stroke-dasharray="2 6"/>
    <path d="M474 331 L 482 336 L 474 341" />
    <path d="M326 331 L 318 336 L 326 341" />
  </g>
  <text x="400" y="362" text-anchor="middle" font-size="9" letter-spacing="3" fill="#96cbaa" opacity="0.55">SWAP CREATORS INSTANTLY</text>
</svg>
