<svg viewBox="0 0 800 520" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="fu-bg" x1="0" y1="0" x2="800" y2="520" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0b0d0c"/>
      <stop offset="1" stop-color="#0f1211"/>
    </linearGradient>
    <radialGradient id="fu-glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(400 270) scale(340 320)">
      <stop offset="0" stop-color="#5AE48E" stop-opacity="0.13"/>
      <stop offset="1" stop-color="#5AE48E" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="fu-ray" x1="560" y1="0" x2="440" y2="520" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8befb0" stop-opacity="0.07"/>
      <stop offset="1" stop-color="#8befb0" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="fu-funnel" x1="0" y1="120" x2="0" y2="230" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#5AE48E" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#5AE48E" stop-opacity="0.02"/>
    </linearGradient>
    <linearGradient id="fu-tile" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5AE48E" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#5AE48E" stop-opacity="0.02"/>
    </linearGradient>
    <linearGradient id="fu-hot" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#43c07d" stop-opacity="0.24"/>
      <stop offset="1" stop-color="#43c07d" stop-opacity="0.05"/>
    </linearGradient>
    <filter id="fu-soft" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="16"/></filter>
    <filter id="fu-sm" x="-120%" y="-120%" width="340%" height="340%"><feGaussianBlur stdDeviation="4"/></filter>
  </defs>

  <rect width="800" height="520" fill="url(#fu-bg)"/>
  <polygon points="560,0 680,0 560,520 440,520" fill="url(#fu-ray)"/>
  <rect width="800" height="520" fill="url(#fu-glow)"/>

  <g fill="#7EEBA8">
    <circle cx="96" cy="72" r="2.5" opacity="0.55"/>
    <circle cx="96" cy="72" r="7" opacity="0.14" filter="url(#fu-sm)"/>
    <circle cx="714" cy="92" r="2.5" opacity="0.55"/>
    <circle cx="82" cy="430" r="2" opacity="0.4"/>
    <circle cx="730" cy="410" r="2" opacity="0.4"/>
    <circle cx="672" cy="270" r="2" opacity="0.4"/>
    <circle cx="128" cy="270" r="2" opacity="0.4"/>
  </g>

  <!-- the scroll: a row of videos, yours lit up -->
  <g opacity="0.5">
    <rect x="170" y="58" width="68" height="54" rx="12" fill="url(#fu-tile)" stroke="#5AE48E" stroke-opacity="0.25"/>
    <rect x="270" y="58" width="68" height="54" rx="12" fill="url(#fu-tile)" stroke="#5AE48E" stroke-opacity="0.25"/>
    <rect x="470" y="58" width="68" height="54" rx="12" fill="url(#fu-tile)" stroke="#5AE48E" stroke-opacity="0.25"/>
    <rect x="570" y="58" width="68" height="54" rx="12" fill="url(#fu-tile)" stroke="#5AE48E" stroke-opacity="0.25"/>
    <g fill="#96cbaa" opacity="0.5">
      <path d="M199 78 L 212 85 L 199 92 Z"/>
      <path d="M299 78 L 312 85 L 299 92 Z"/>
      <path d="M499 78 L 512 85 L 499 92 Z"/>
      <path d="M599 78 L 612 85 L 599 92 Z"/>
    </g>
  </g>
  <rect x="370" y="58" width="68" height="54" rx="12" fill="url(#fu-hot)" stroke="#7EEBA8" stroke-opacity="0.9" stroke-width="1.3"/>
  <path d="M398 78 L 413 85.5 L 398 93 Z" fill="#7EEBA8"/>

  <!-- funnel -->
  <polygon points="170,122 638,122 452,232 348,232" fill="url(#fu-funnel)"/>
  <path d="M170 122 L 348 232 M638 122 L 452 232" stroke="#5AE48E" stroke-opacity="0.22"/>

  <!-- the video that holds attention -->
  <g>
    <ellipse cx="400" cy="300" rx="110" ry="130" fill="#43c07d" opacity="0.16" filter="url(#fu-soft)"/>
    <rect x="342" y="232" width="116" height="196" rx="24" fill="url(#fu-hot)" stroke="#7EEBA8" stroke-opacity="0.9" stroke-width="1.5"/>
    <circle cx="400" cy="306" r="26" fill="#0e1a13" stroke="#7EEBA8" stroke-opacity="0.9"/>
    <path d="M392 294 L 413 306 L 392 318 Z" fill="#7EEBA8"/>
    <circle cx="400" cy="306" r="26" fill="#7EEBA8" opacity="0.16" filter="url(#fu-sm)"/>
    <rect x="364" y="396" width="72" height="5" rx="2.5" fill="#5AE48E" opacity="0.16"/>
    <rect x="364" y="396" width="46" height="5" rx="2.5" fill="#7EEBA8" opacity="0.8"/>
  </g>

  <!-- to the sale -->
  <path d="M400 428 V 452" stroke="#7EEBA8" stroke-opacity="0.4" stroke-dasharray="3 6"/>
  <path d="M394 446 L 400 454 L 406 446" stroke="#7EEBA8" stroke-opacity="0.55" fill="none" stroke-linecap="round"/>
  <g>
    <circle cx="400" cy="482" r="26" fill="#0e1a13" stroke="#7EEBA8" stroke-opacity="0.9" stroke-width="1.4"/>
    <circle cx="400" cy="482" r="26" fill="#7EEBA8" opacity="0.14" filter="url(#fu-sm)"/>
    <g stroke="#7EEBA8" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M388 473 H 393 L 397 488 H 411 L 415 477 H 396"/>
      <circle cx="400" cy="493" r="1.8" fill="#7EEBA8"/>
      <circle cx="410" cy="493" r="1.8" fill="#7EEBA8"/>
    </g>
  </g>
</svg>
