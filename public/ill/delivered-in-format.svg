<svg viewBox="0 0 800 300" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="Inter, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="d-bg" x1="0" y1="0" x2="800" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0b0d0c"/>
      <stop offset="1" stop-color="#0f1211"/>
    </linearGradient>
    <radialGradient id="d-glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(400 150) scale(340 240)">
      <stop offset="0" stop-color="#5AE48E" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#5AE48E" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="d-ray" x1="240" y1="0" x2="360" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8befb0" stop-opacity="0.07"/>
      <stop offset="1" stop-color="#8befb0" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="d-tile" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5AE48E" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#5AE48E" stop-opacity="0.02"/>
    </linearGradient>
    <linearGradient id="d-hot" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#43c07d" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#43c07d" stop-opacity="0.04"/>
    </linearGradient>
    <filter id="d-soft" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="14"/></filter>
    <filter id="d-sm" x="-120%" y="-120%" width="340%" height="340%"><feGaussianBlur stdDeviation="4"/></filter>
  </defs>

  <rect width="800" height="300" fill="url(#d-bg)"/>
  <polygon points="240,0 360,0 460,300 340,300" fill="url(#d-ray)"/>
  <rect width="800" height="300" fill="url(#d-glow)"/>

  <g fill="#7EEBA8">
    <circle cx="94" cy="60" r="2.5" opacity="0.55"/>
    <circle cx="94" cy="60" r="7" opacity="0.14" filter="url(#d-sm)"/>
    <circle cx="712" cy="56" r="2.5" opacity="0.55"/>
    <circle cx="72" cy="240" r="2" opacity="0.4"/>
    <circle cx="738" cy="244" r="2" opacity="0.4"/>
  </g>

  <!-- one source dot splitting into three formats -->
  <circle cx="400" cy="46" r="5" fill="#7EEBA8"/>
  <circle cx="400" cy="46" r="11" fill="#7EEBA8" opacity="0.25" filter="url(#d-sm)"/>
  <g stroke="#5AE48E" stroke-opacity="0.35" fill="none">
    <path d="M400 51 C 400 70 216 60 216 88"/>
    <path d="M400 51 V 88"/>
    <path d="M400 51 C 400 70 592 60 592 88"/>
  </g>

  <!-- 1:1 -->
  <g>
    <rect x="152" y="112" width="128" height="128" rx="18" fill="url(#d-tile)" stroke="#5AE48E" stroke-opacity="0.35"/>
    <circle cx="216" cy="176" r="16" fill="#0e1a13" stroke="#5AE48E" stroke-opacity="0.6"/>
    <path d="M212 169 L 224 176 L 212 183 Z" fill="#96cbaa" opacity="0.85"/>
    <text x="216" y="266" text-anchor="middle" font-size="10" letter-spacing="2" fill="#96cbaa" opacity="0.55">1:1</text>
  </g>

  <!-- 9:16 hero -->
  <g>
    <ellipse cx="400" cy="172" rx="90" ry="110" fill="#43c07d" opacity="0.16" filter="url(#d-soft)"/>
    <rect x="354" y="94" width="92" height="164" rx="18" fill="url(#d-hot)" stroke="#7EEBA8" stroke-opacity="0.9" stroke-width="1.4"/>
    <circle cx="400" cy="168" r="19" fill="#0e1a13" stroke="#7EEBA8" stroke-opacity="0.9"/>
    <path d="M395 159 L 410 168 L 395 177 Z" fill="#7EEBA8"/>
    <circle cx="400" cy="168" r="19" fill="#7EEBA8" opacity="0.18" filter="url(#d-sm)"/>
    <rect x="370" y="234" width="60" height="4" rx="2" fill="#5AE48E" opacity="0.16"/>
    <rect x="370" y="234" width="38" height="4" rx="2" fill="#7EEBA8" opacity="0.8"/>
    <text x="400" y="284" text-anchor="middle" font-size="10" letter-spacing="2" fill="#96cbaa" opacity="0.7">9:16</text>
  </g>

  <!-- 16:9 -->
  <g>
    <rect x="520" y="130" width="160" height="92" rx="16" fill="url(#d-tile)" stroke="#5AE48E" stroke-opacity="0.35"/>
    <circle cx="600" cy="176" r="16" fill="#0e1a13" stroke="#5AE48E" stroke-opacity="0.6"/>
    <path d="M596 169 L 608 176 L 596 183 Z" fill="#96cbaa" opacity="0.85"/>
    <text x="600" y="266" text-anchor="middle" font-size="10" letter-spacing="2" fill="#96cbaa" opacity="0.55">16:9</text>
  </g>
</svg>
