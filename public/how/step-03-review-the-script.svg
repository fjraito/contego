<svg viewBox="0 0 800 300" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="Inter, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="s3-bg" x1="0" y1="0" x2="800" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0b0d0c"/>
      <stop offset="1" stop-color="#0f1211"/>
    </linearGradient>
    <radialGradient id="s3-glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(400 150) scale(360 260)">
      <stop offset="0" stop-color="#5AE48E" stop-opacity="0.11"/>
      <stop offset="1" stop-color="#5AE48E" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="s3-ray" x1="600" y1="0" x2="480" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8befb0" stop-opacity="0.09"/>
      <stop offset="1" stop-color="#8befb0" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="s3-tile" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5AE48E" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#5AE48E" stop-opacity="0.02"/>
    </linearGradient>
    <filter id="s3-soft" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="10"/></filter>
    <filter id="s3-soft-sm" x="-120%" y="-120%" width="340%" height="340%"><feGaussianBlur stdDeviation="4"/></filter>
  </defs>

  <rect width="800" height="300" fill="url(#s3-bg)"/>
  <polygon points="580,0 700,0 560,300 440,300" fill="url(#s3-ray)"/>
  <rect width="800" height="300" fill="url(#s3-glow)"/>

  <g stroke="#5AE48E" stroke-opacity="0.05">
    <path d="M0 100H800M0 200H800"/>
    <path d="M200 0V300M400 0V300M600 0V300"/>
  </g>

  <g fill="#7EEBA8">
    <circle cx="100" cy="58" r="2.5" opacity="0.6"/>
    <circle cx="100" cy="58" r="7" opacity="0.15" filter="url(#s3-soft-sm)"/>
    <circle cx="716" cy="64" r="2.5" opacity="0.6"/>
    <circle cx="84" cy="246" r="2" opacity="0.4"/>
    <circle cx="742" cy="238" r="2" opacity="0.45"/>
  </g>

  <!-- script panel -->
  <g>
    <rect x="150" y="44" width="360" height="212" rx="20" fill="url(#s3-tile)" stroke="#5AE48E" stroke-opacity="0.35"/>
    <text x="178" y="76" font-size="9" letter-spacing="3" fill="#96cbaa" opacity="0.65">UGC SCRIPT · V2</text>

    <!-- hook block, highlighted -->
    <rect x="170" y="90" width="320" height="44" rx="10" fill="#7EEBA8" opacity="0.07"/>
    <rect x="170" y="90" width="3" height="44" rx="1.5" fill="#7EEBA8" opacity="0.9"/>
    <text x="186" y="106" font-size="8" letter-spacing="2" fill="#7EEBA8" opacity="0.9">HOOK</text>
    <rect x="186" y="114" width="220" height="6" rx="3" fill="#7EEBA8" opacity="0.6"/>
    <!-- typing cursor -->
    <rect x="412" y="111" width="2" height="12" fill="#7EEBA8"/>

    <text x="186" y="154" font-size="8" letter-spacing="2" fill="#96cbaa" opacity="0.5">BODY</text>
    <rect x="186" y="162" width="280" height="6" rx="3" fill="#5AE48E" opacity="0.28"/>
    <rect x="186" y="176" width="244" height="6" rx="3" fill="#5AE48E" opacity="0.28"/>

    <text x="186" y="208" font-size="8" letter-spacing="2" fill="#96cbaa" opacity="0.5">CTA</text>
    <rect x="186" y="216" width="164" height="6" rx="3" fill="#5AE48E" opacity="0.28"/>
  </g>

  <!-- connector to approval -->
  <path d="M510 150 C 550 150 550 150 584 150" stroke="#7EEBA8" stroke-opacity="0.45" stroke-dasharray="3 7" stroke-linecap="round"/>

  <!-- approval node -->
  <g>
    <ellipse cx="644" cy="150" rx="76" ry="76" fill="#43c07d" opacity="0.16" filter="url(#s3-soft)"/>
    <circle cx="644" cy="150" r="40" fill="#0e1a13" stroke="#7EEBA8" stroke-opacity="0.9" stroke-width="1.5"/>
    <circle cx="644" cy="150" r="49" stroke="#7EEBA8" stroke-opacity="0.15"/>
    <path d="M628 150 L 640 162 L 662 136" stroke="#7EEBA8" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <g>
    <rect x="590" y="206" width="108" height="24" rx="12" fill="#0e1a13" stroke="#7EEBA8" stroke-opacity="0.9"/>
    <text x="644" y="222" text-anchor="middle" font-size="10" letter-spacing="1.5" fill="#7EEBA8">YOU APPROVE</text>
  </g>

  <!-- small comment bubble on script -->
  <g>
    <rect x="452" y="60" width="96" height="26" rx="13" fill="#0e1a13" stroke="#5AE48E" stroke-opacity="0.6"/>
    <circle cx="468" cy="73" r="3" fill="#7EEBA8" opacity="0.8"/>
    <rect x="478" y="70" width="58" height="5" rx="2.5" fill="#96cbaa" opacity="0.45"/>
  </g>
</svg>
