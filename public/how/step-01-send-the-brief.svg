<svg viewBox="0 0 800 300" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="Inter, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="s1-bg" x1="0" y1="0" x2="800" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0b0d0c"/>
      <stop offset="1" stop-color="#0f1211"/>
    </linearGradient>
    <radialGradient id="s1-glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(640 150) scale(320 240)">
      <stop offset="0" stop-color="#5AE48E" stop-opacity="0.13"/>
      <stop offset="1" stop-color="#5AE48E" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="s1-ray" x1="200" y1="0" x2="340" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8befb0" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#8befb0" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="s1-tile" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5AE48E" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#5AE48E" stop-opacity="0.02"/>
    </linearGradient>
    <filter id="s1-soft" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="10"/></filter>
    <filter id="s1-soft-sm" x="-120%" y="-120%" width="340%" height="340%"><feGaussianBlur stdDeviation="4"/></filter>
  </defs>

  <rect width="800" height="300" fill="url(#s1-bg)"/>
  <polygon points="200,0 320,0 420,300 300,300" fill="url(#s1-ray)"/>
  <rect width="800" height="300" fill="url(#s1-glow)"/>

  <g stroke="#5AE48E" stroke-opacity="0.05">
    <path d="M0 100H800M0 200H800"/>
    <path d="M200 0V300M400 0V300M600 0V300"/>
  </g>

  <g fill="#7EEBA8">
    <circle cx="90" cy="52" r="2.5" opacity="0.6"/>
    <circle cx="90" cy="52" r="7" opacity="0.15" filter="url(#s1-soft-sm)"/>
    <circle cx="730" cy="60" r="2.5" opacity="0.6"/>
    <circle cx="120" cy="252" r="2" opacity="0.4"/>
    <circle cx="756" cy="240" r="2" opacity="0.45"/>
  </g>

  <!-- brief document tile -->
  <g>
    <rect x="66" y="56" width="196" height="188" rx="20" fill="url(#s1-tile)" stroke="#5AE48E" stroke-opacity="0.35"/>
    <text x="90" y="88" font-size="9" letter-spacing="3" fill="#96cbaa" opacity="0.65">BRIEF</text>
    <g font-size="8" letter-spacing="1.5" fill="#96cbaa" opacity="0.5">
      <text x="90" y="116">PRODUCT</text>
      <text x="90" y="150">AUDIENCE</text>
      <text x="90" y="184">OFFER</text>
    </g>
    <rect x="90" y="122" width="118" height="6" rx="3" fill="#7EEBA8" opacity="0.55"/>
    <rect x="90" y="156" width="92" height="6" rx="3" fill="#5AE48E" opacity="0.30"/>
    <rect x="90" y="190" width="106" height="6" rx="3" fill="#5AE48E" opacity="0.30"/>
    <rect x="90" y="212" width="64" height="6" rx="3" fill="#5AE48E" opacity="0.18"/>
  </g>

  <!-- attachment chips -->
  <g font-size="10" letter-spacing="1">
    <rect x="300" y="92" width="112" height="30" rx="15" fill="url(#s1-tile)" stroke="#5AE48E" stroke-opacity="0.25"/>
    <text x="356" y="111" text-anchor="middle" fill="#a6d6ba" opacity="0.75">references</text>
    <rect x="300" y="136" width="112" height="30" rx="15" fill="url(#s1-tile)" stroke="#5AE48E" stroke-opacity="0.25"/>
    <text x="356" y="155" text-anchor="middle" fill="#a6d6ba" opacity="0.75">brand rules</text>
    <rect x="300" y="180" width="112" height="30" rx="15" fill="url(#s1-tile)" stroke="#5AE48E" stroke-opacity="0.25"/>
    <text x="356" y="199" text-anchor="middle" fill="#a6d6ba" opacity="0.75">campaign goal</text>
  </g>

  <!-- dashed flight path -->
  <path d="M412 150 C 480 150 500 150 560 150" stroke="#7EEBA8" stroke-opacity="0.45" stroke-dasharray="3 7" stroke-linecap="round"/>
  <path d="M552 144 L 562 150 L 552 156" stroke="#7EEBA8" stroke-opacity="0.55" fill="none" stroke-linecap="round"/>

  <!-- send node -->
  <g>
    <ellipse cx="636" cy="150" rx="80" ry="80" fill="#43c07d" opacity="0.16" filter="url(#s1-soft)"/>
    <circle cx="636" cy="150" r="44" fill="#0e1a13" stroke="#7EEBA8" stroke-opacity="0.9" stroke-width="1.5"/>
    <circle cx="636" cy="150" r="52" stroke="#7EEBA8" stroke-opacity="0.15"/>
    <!-- paper plane -->
    <g fill="#7EEBA8">
      <path d="M616 156 L 658 134 L 646 166 L 636 154 Z"/>
      <path d="M636 154 L 646 166 L 638 158 Z" opacity="0.6"/>
    </g>
  </g>
  <g>
    <rect x="592" y="212" width="88" height="24" rx="12" fill="#0e1a13" stroke="#7EEBA8" stroke-opacity="0.9"/>
    <text x="636" y="228" text-anchor="middle" font-size="10" letter-spacing="1.5" fill="#7EEBA8">ONE BRIEF</text>
  </g>
</svg>
