<svg viewBox="0 0 800 300" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="Inter, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="s4-bg" x1="0" y1="0" x2="800" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0b0d0c"/>
      <stop offset="1" stop-color="#0f1211"/>
    </linearGradient>
    <radialGradient id="s4-glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(200 150) scale(300 240)">
      <stop offset="0" stop-color="#5AE48E" stop-opacity="0.13"/>
      <stop offset="1" stop-color="#5AE48E" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="s4-ray" x1="420" y1="0" x2="560" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8befb0" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#8befb0" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="s4-tile" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5AE48E" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#5AE48E" stop-opacity="0.02"/>
    </linearGradient>
    <linearGradient id="s4-meter" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#43c07d"/>
      <stop offset="1" stop-color="#8befb0"/>
    </linearGradient>
    <linearGradient id="s4-scan" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7EEBA8" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#7EEBA8" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#7EEBA8" stop-opacity="0"/>
    </linearGradient>
    <filter id="s4-soft" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="10"/></filter>
    <filter id="s4-soft-sm" x="-120%" y="-120%" width="340%" height="340%"><feGaussianBlur stdDeviation="4"/></filter>
    <clipPath id="s4-clip"><rect x="96" y="52" width="150" height="196" rx="22"/></clipPath>
  </defs>

  <rect width="800" height="300" fill="url(#s4-bg)"/>
  <polygon points="420,0 540,0 640,300 520,300" fill="url(#s4-ray)"/>
  <rect width="800" height="300" fill="url(#s4-glow)"/>

  <g stroke="#5AE48E" stroke-opacity="0.05">
    <path d="M0 100H800M0 200H800"/>
    <path d="M200 0V300M400 0V300M600 0V300"/>
  </g>

  <g fill="#7EEBA8">
    <circle cx="330" cy="52" r="2.5" opacity="0.6"/>
    <circle cx="330" cy="52" r="7" opacity="0.15" filter="url(#s4-soft-sm)"/>
    <circle cx="730" cy="56" r="2.5" opacity="0.6"/>
    <circle cx="70" cy="250" r="2" opacity="0.4"/>
    <circle cx="748" cy="244" r="2" opacity="0.45"/>
  </g>

  <!-- AI creator tile being rendered -->
  <g>
    <ellipse cx="171" cy="150" rx="100" ry="120" fill="#43c07d" opacity="0.14" filter="url(#s4-soft)"/>
    <rect x="96" y="52" width="150" height="196" rx="22" fill="url(#s4-tile)" stroke="#7EEBA8" stroke-opacity="0.8" stroke-width="1.4"/>
    <g clip-path="url(#s4-clip)">
      <circle cx="171" cy="130" r="30" fill="#7EEBA8" opacity="0.85"/>
      <path d="M118 248 C 118 202 146 186 171 186 C 196 186 224 202 224 248" fill="#7EEBA8" opacity="0.5"/>
      <!-- render scan band -->
      <rect x="96" y="96" width="150" height="52" fill="url(#s4-scan)"/>
      <path d="M96 122 H 246" stroke="#7EEBA8" stroke-opacity="0.8"/>
    </g>
    <rect x="96" y="52" width="150" height="196" rx="22" stroke="#7EEBA8" stroke-opacity="0.8" stroke-width="1.4" fill="none"/>
    <text x="171" y="270" text-anchor="middle" font-size="9" letter-spacing="2.5" fill="#96cbaa" opacity="0.6">AI CREATOR</text>
  </g>

  <!-- voice waveform panel -->
  <g>
    <rect x="300" y="88" width="196" height="124" rx="18" fill="url(#s4-tile)" stroke="#5AE48E" stroke-opacity="0.30"/>
    <text x="322" y="116" font-size="8" letter-spacing="2.5" fill="#96cbaa" opacity="0.6">NATURAL VOICE</text>
    <g stroke="#7EEBA8" stroke-width="4" stroke-linecap="round">
      <path d="M328 162 V 170" opacity="0.4"/>
      <path d="M342 152 V 180" opacity="0.6"/>
      <path d="M356 142 V 190" opacity="0.9"/>
      <path d="M370 156 V 176" opacity="0.55"/>
      <path d="M384 136 V 196" opacity="1"/>
      <path d="M398 150 V 182" opacity="0.7"/>
      <path d="M412 144 V 188" opacity="0.85"/>
      <path d="M426 158 V 174" opacity="0.5"/>
      <path d="M440 148 V 184" opacity="0.65"/>
      <path d="M454 160 V 172" opacity="0.4"/>
    </g>
    <path d="M384 136 V 196" stroke="#7EEBA8" stroke-width="4" opacity="0.4" filter="url(#s4-soft-sm)"/>
  </g>

  <!-- realism meter panel -->
  <g>
    <rect x="540" y="72" width="196" height="156" rx="18" fill="url(#s4-tile)" stroke="#5AE48E" stroke-opacity="0.30"/>
    <text x="562" y="102" font-size="8" letter-spacing="2.5" fill="#96cbaa" opacity="0.6">REALISM</text>
    <text x="562" y="146" font-size="34" font-weight="600" fill="#7EEBA8">98%</text>
    <text x="562" y="146" font-size="34" font-weight="600" fill="#7EEBA8" opacity="0.35" filter="url(#s4-soft-sm)">98%</text>
    <rect x="562" y="166" width="152" height="6" rx="3" fill="#5AE48E" opacity="0.15"/>
    <rect x="562" y="166" width="149" height="6" rx="3" fill="url(#s4-meter)"/>
    <rect x="562" y="166" width="149" height="6" rx="3" fill="#7EEBA8" opacity="0.35" filter="url(#s4-soft-sm)"/>
    <g font-size="8" letter-spacing="1.5" fill="#96cbaa" opacity="0.5">
      <text x="562" y="196">NO PLASTIC FACES</text>
      <text x="562" y="210">NO ROBOTIC VOICE</text>
    </g>
  </g>

  <!-- connectors -->
  <g stroke="#5AE48E" stroke-opacity="0.4" stroke-dasharray="3 7" stroke-linecap="round" fill="none">
    <path d="M246 150 H 300"/>
    <path d="M496 150 H 540"/>
  </g>
</svg>
